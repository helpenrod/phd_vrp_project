# =========================
# VRPTW Demo Configuration
# Direct encoding with 0-delimited routes, GA operators guarded by time windows
# Distance units = time units when fleet.speed = 1.0 (time = distance / speed)
# =========================
fleet:
  capacity: 30   # vehicle capacity (homogeneous fleet)
  speed: 1.0     # time = Euclidean distance / speed

objective: distance

constraints:
  problem_type: [time_window]
  split_delivery: false  # set true only if you want automatic demand splitting

parameters:
  seed: 42
  population_size: 60
  generations: 300
  crossover_prob: 0.9
  mutation_prob: 0.3
  tournament_size: 3

instance:
  # Node 0 must be the depot
  coordinates:
    0: [50, 50]   # depot
    1: [30, 70]
    2: [35, 40]
    3: [55, 20]
    4: [80, 65]
    5: [20, 85]
    6: [60, 80]
    7: [25, 25]
    8: [75, 30]
    9: [45, 75]
    10: [65, 55]

  # Demands for customers (1..n). Depot demand is omitted.
  demand:
    1: 8
    2: 6
    3: 10
    4: 7
    5: 9
    6: 5
    7: 8
    8: 6
    9: 7
    10: 8

  # Time windows (ready_time / due_time) and service times.
  # All times are in the same units as travel time (distance / speed).
  # Make sure depot window is wide enough to allow returns.
  ready_time:
    0: 0      # depot earliest departure
    1: 0
    2: 10
    3: 20
    4: 0
    5: 0
    6: 30
    7: 0
    8: 40
    9: 10
    10: 0
  due_time:
    0: 1.0e6  # effectively "no limit" for depot return
    1: 120
    2: 140
    3: 160
    4: 150
    5: 110
    6: 180
    7: 130
    8: 190
    9: 150
    10: 160
  service_time:
    0: 0
    1: 5
    2: 5
    3: 5
    4: 5
    5: 5
    6: 5
    7: 5
    8: 5
    9: 5
    10: 5
