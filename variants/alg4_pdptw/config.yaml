instance:
  coordinates:
    0: [0, 0]
    1: [1, 1]
    2: [2, 2]
    3: [-1, -1]
    4: [-2, -2]
  demand:
    0: 0
    1: 1
    2: -1
    3: 1
    4: -1
  pickups:
    1: 2
    3: 4
  ready_time:
    0: 0
    1: 0
    2: 0
    3: 0
    4: 0
  due_time:
    0: 1000
    1: 1000
    2: 1000
    3: 1000
    4: 1000
  service_time: {0: 0, 1: 0, 2: 0, 3: 0, 4: 0}

fleet:
  capacity: 10
  speed: 1.0

constraints:
  problem_type: ["capacity", "time_window", "pickup_delivery"]

parameters:
  population_size: 20
  generations: 50
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3
  seed: 42
objective: "distance"