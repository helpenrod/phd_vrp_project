name: Time-window-only smoke test
description: Minimal VRP instance with time windows and no capacity constraint.

objective: distance

constraints:
  problem_type: [time_window]
  split_delivery: false

parameters:
  seed: 42
  population_size: 20
  generations: 50
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3

fleet:
  speed: 1.0

instance:
  coordinates:
    0: [0, 0]
    1: [5, 0]
    2: [15, 0]
    3: [25, 0]
  demand:
    1: 0
    2: 0
    3: 0
  ready_time:
    0: 0
    1: 5
    2: 15
    3: 25
  due_time:
    0: 1000
    1: 20
    2: 30
    3: 40
  service_time:
    0: 0
    1: 0
    2: 0
    3: 0
