name: Pickup-delivery-only smoke test
description: Minimal instance that verifies pickup-before-delivery precedence for multiple pairs.

objective: distance

constraints:
  problem_type: [pickup_delivery]
  split_delivery: false

parameters:
  seed: 42
  population_size: 20
  generations: 50
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3

fleet:
  speed: 1.0

instance:
  coordinates:
    0: [0, 0]
    1: [1, 0]
    2: [2, 0]
    3: [3, 0]
    4: [4, 0]
  demand:
    1: 0
    2: 0
    3: 0
    4: 0
  pickups:
    1: 3
    2: 4

test_case:
  valid_route: [0, 1, 2, 3, 4, 0]
  invalid_route: [0, 1, 4, 2, 3, 0]
  expected_valid_feasible: true
  expected_invalid_feasible: false
  reason: Delivery nodes 3 and 4 must be visited after their pickups 1 and 2.
