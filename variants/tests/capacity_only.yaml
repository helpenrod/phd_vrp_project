name: Capacity-only smoke test
description: Minimal capacity-constrained VRP instance for hyper-heuristic validation.

objective: distance

constraints:
  problem_type: [capacity]
  split_delivery: false

parameters:
  seed: 42
  population_size: 20
  generations: 50
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3

fleet:
  capacity: 10

instance:
  coordinates:
    0: [0, 0]
    1: [1, 5]
    2: [3, 2]
    3: [9, 1]

  demand:
    1: 6
    2: 5
    3: 4
