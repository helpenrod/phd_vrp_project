name: Capacity and pickup-delivery smoke test
description: Minimal instance combining vehicle capacity with multiple pickup-delivery pairs.

objective: distance

constraints:
  problem_type: [capacity, pickup_delivery]
  split_delivery: false

parameters:
  seed: 42
  population_size: 20
  generations: 50
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3

fleet:
  capacity: 5
  speed: 1.0

instance:
  coordinates:
    0: [0, 0]
    1: [1, 0]
    2: [2, 0]
    3: [3, 0]
    4: [4, 0]
  demand:
    1: 4
    2: 3
    3: -4
    4: -3
  pickups:
    1: 3
    2: 4

test_case:
  valid_route: [0, 1, 3, 2, 4, 0]
  overload_route: [0, 1, 2, 3, 4, 0]
  invalid_precedence_route: [0, 1, 4, 2, 3, 0]
  expected_valid_feasible: true
  expected_overload_feasible: false
  expected_invalid_precedence_feasible: false
  expected_valid_peak_load: 4
  expected_overload_peak_load: 7
  reason: Delivering pair 1 before picking pair 2 keeps peak load within capacity 5; carrying both pickups first exceeds capacity.
