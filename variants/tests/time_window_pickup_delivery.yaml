name: Time-window and pickup-delivery smoke test
description: Minimal instance combining time windows with pickup-delivery precedence.

objective: distance

constraints:
  problem_type: [time_window, pickup_delivery]
  split_delivery: false

parameters:
  seed: 42
  population_size: 20
  generations: 50
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3

fleet:
  speed: 1.0

instance:
  coordinates:
    0: [0, 0]
    1: [5, 0]
    2: [10, 0]
  demand:
    1: 0
    2: 0
  pickups:
    2: 1
  ready_time:
    0: 0
    1: 5
    2: 6
  due_time:
    0: 1000
    1: 30
    2: 10
  service_time:
    0: 0
    1: 0
    2: 0

