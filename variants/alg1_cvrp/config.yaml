name: CVRP Direct GA (Minimal)
description: Direct-coding GA baseline for CVRP (routes delimited by 0)

objective: distance

constraints:
  problem_type: [capacity]
  split_delivery: true   # set to false to enforce strict CVRP (no splits)

parameters:
  population_size: 50
  generations: 200
  crossover_prob: 0.8
  mutation_prob: 0.2
  tournament_size: 3
  seed: 42
  use_2opt: false

fleet:
  capacity: 100

instance:
  coordinates:
    0: [50, 50]   # depot
    1: [30, 60]
    2: [20, 40]
    3: [40, 30]
    4: [60, 20]
    5: [80, 40]
    6: [70, 60]
  demand:
    1: 10
    2: 115     
    3: 18
    4: 20
    5: 25
    6: 210
